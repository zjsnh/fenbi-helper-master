/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  
  /* solo-design consumption aliases: explicit prefix for fill-html-head.mjs */
  --apple-background: var(--background, #ffffff);
  --apple-foreground: var(--foreground, #0f172a);
  --apple-card: var(--card, var(--background));
  --apple-card-foreground: var(--card-foreground, var(--foreground));
  --apple-popover: var(--popover, var(--card));
  --apple-popover-foreground: var(--popover-foreground, var(--card-foreground, var(--foreground)));
  --apple-primary: var(--primary, #111827);
  --apple-primary-foreground: var(--primary-foreground, #ffffff);
  --apple-secondary: var(--secondary, var(--muted, var(--card)));
  --apple-secondary-foreground: var(--secondary-foreground, var(--foreground));
  --apple-muted: var(--muted, var(--card));
  --apple-muted-foreground: var(--muted-foreground, var(--foreground));
  --apple-accent: var(--accent, var(--secondary, var(--muted, var(--card))));
  --apple-accent-foreground: var(--accent-foreground, var(--foreground));
  --apple-destructive: var(--destructive, #ef4444);
  --apple-destructive-foreground: var(--destructive-foreground, #ffffff);
  --apple-border: var(--border, currentColor);
  --apple-input: var(--input, var(--border));
  --apple-ring: var(--ring, var(--primary));
  --apple-chart-1: var(--chart-1, var(--primary));
  --apple-chart-2: var(--chart-2, var(--secondary, var(--primary)));
  --apple-chart-3: var(--chart-3, var(--accent, var(--primary)));
  --apple-chart-4: var(--chart-4, var(--muted-foreground, var(--foreground)));
  --apple-chart-5: var(--chart-5, var(--foreground));
  --apple-sidebar: var(--sidebar, var(--background));
  --apple-sidebar-foreground: var(--sidebar-foreground, var(--foreground));
  --apple-sidebar-primary: var(--sidebar-primary, var(--primary));
  --apple-sidebar-primary-foreground: var(--sidebar-primary-foreground, var(--primary-foreground));
  --apple-sidebar-accent: var(--sidebar-accent, var(--accent, var(--muted, var(--card))));
  --apple-sidebar-accent-foreground: var(--sidebar-accent-foreground, var(--accent-foreground, var(--foreground)));

/* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

body{margin:0;padding:12px;background:var(--background);color:var(--foreground);font:500 14px/1.4 var(--font-sans)}.row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}.label{width:72px;padding-top:6px;color:var(--muted-foreground);font-size:10px;letter-spacing:.12em;text-transform:uppercase;flex:0 0 auto}.grid{display:grid;gap:8px;flex:1}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.card{display:flex;flex-direction:column;gap:8px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--card-foreground);box-shadow:var(--shadow-xs);transition:border-color .2s ease,transform .2s ease}.card:hover{border-color:var(--primary);transform:translateY(-1px)}.media{aspect-ratio:1;border-radius:calc(var(--radius) - 4px);background:linear-gradient(135deg,var(--secondary),var(--background));border:1px solid var(--border)}.story .media{aspect-ratio:1.25;background:linear-gradient(135deg,var(--foreground),var(--secondary))}.eyebrow{color:var(--muted-foreground);font-size:10px;letter-spacing:.08em;text-transform:uppercase}.title{font-size:15px;line-height:1.25}.price{font-variant-numeric:tabular-nums}.cta{display:inline-flex;align-self:flex-start;padding:7px 10px;border-radius:999px;background:var(--primary);color:var(--primary-foreground);font-size:12px;text-decoration:none}.muted{color:var(--muted-foreground)}.is-disabled{opacity:.55}.divider{margin:10px 0;border:0;border-top:1px solid var(--border)}

    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--apple-background);
    --color-foreground: var(--apple-foreground);
    --color-card: var(--apple-card);
    --color-card-foreground: var(--apple-card-foreground);
    --color-popover: var(--apple-popover);
    --color-popover-foreground: var(--apple-popover-foreground);
    --color-primary: var(--apple-primary);
    --color-primary-foreground: var(--apple-primary-foreground);
    --color-secondary: var(--apple-secondary);
    --color-secondary-foreground: var(--apple-secondary-foreground);
    --color-muted: var(--apple-muted);
    --color-muted-foreground: var(--apple-muted-foreground);
    --color-accent: var(--apple-accent);
    --color-accent-foreground: var(--apple-accent-foreground);
    --color-destructive: var(--apple-destructive);
    --color-destructive-foreground: var(--apple-destructive-foreground);
    --color-border: var(--apple-border);
    --color-input: var(--apple-input);
    --color-ring: var(--apple-ring);
    --color-chart-1: var(--apple-chart-1);
    --color-chart-2: var(--apple-chart-2);
    --color-chart-3: var(--apple-chart-3);
    --color-chart-4: var(--apple-chart-4);
    --color-chart-5: var(--apple-chart-5);
    --color-sidebar: var(--apple-sidebar);
    --color-sidebar-foreground: var(--apple-sidebar-foreground);
    --color-sidebar-primary: var(--apple-sidebar-primary);
    --color-sidebar-primary-foreground: var(--apple-sidebar-primary-foreground);
    --color-sidebar-accent: var(--apple-sidebar-accent);
    --color-sidebar-accent-foreground: var(--apple-sidebar-accent-foreground);
  }
  @layer base {
    body { background: var(--apple-background); color: var(--apple-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;

        background-color: currentColor;

<body style="font-family: var(--font-sans); margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">

  <main class="w-full flex items-center justify-center" style="min-height: 100vh; padding: 24px;">
    <div class="w-full" style="max-width: 400px;">
      <!-- Login Card -->
      <section class="flex flex-col items-center gap-8" style="padding: 48px 32px; border-radius: var(--radius); background: rgba(255, 255, 255, 0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border: 1px solid var(--apple-border);">

        <!-- Branding -->
        <div class="flex flex-col items-center gap-2">
          <h1 class="flex items-center justify-center" style="font-size: clamp(28px, 3.5vw, 36px); font-weight: 600; line-height: 1.15; color: var(--apple-foreground); letter-spacing: -0.02em; text-wrap: balance; word-break: keep-all; margin: 0;">
            <i data-lucide="pen-tool" style="width: 28px; height: 28px; margin-right: 8px; flex-shrink: 0;"></i>
            粉笔助手
          </h1>
          <p style="font-size: 15px; color: var(--apple-text-500); margin: 0; line-height: 1.5; text-align: center;">
            智能刷题，高效备考
          </p>
        </div>

        <!-- Form -->
        <form class="w-full flex flex-col gap-5" onsubmit="return false;" autocomplete="off">

          <!-- Phone Input -->
          <div class="w-full flex flex-col gap-1.5">
            <label for="phone" style="font-size: 13px; font-weight: 500; color: var(--apple-text-500); letter-spacing: 0;">
              手机号
            </label>
            <div class="field" style="display: flex; align-items: center; gap: calc(var(--spacing) * 2); width: 100%; height: 44px; padding: 0 calc(var(--spacing) * 3); border: 1px solid var(--apple-input); border-radius: var(--radius); background: var(--apple-background); color: var(--apple-foreground); transition: border-color 0.18s ease, box-shadow 0.18s ease;">
              <i data-lucide="smartphone" style="width: 18px; height: 18px; flex-shrink: 0; color: var(--apple-text-400);"></i>
              <input
                id="phone"
                type="tel"
                name="phone"
                placeholder="请输入手机号"
                aria-label="手机号"
                autocomplete="tel"
                class="flex-1"
                style="border: 0; outline: 0; background: transparent; color: inherit; font: inherit; min-width: 0;"
              >
            </div>
          </div>

          <!-- Password Input -->
          <div class="w-full flex flex-col gap-1.5">
            <label for="password" style="font-size: 13px; font-weight: 500; color: var(--apple-text-500); letter-spacing: 0;">
              密码
            </label>
            <div class="field" style="display: flex; align-items: center; gap: calc(var(--spacing) * 2); width: 100%; height: 44px; padding: 0 calc(var(--spacing) * 3); border: 1px solid var(--apple-input); border-radius: var(--radius); background: var(--apple-background); color: var(--apple-foreground); transition: border-color 0.18s ease, box-shadow 0.18s ease;">
              <i data-lucide="lock" style="width: 18px; height: 18px; flex-shrink: 0; color: var(--apple-text-400);"></i>
              <input
                id="password"
                type="password"
                name="password"
                placeholder="请输入密码"
                aria-label="密码"
                autocomplete="current-password"
                class="flex-1"
                style="border: 0; outline: 0; background: transparent; color: inherit; font: inherit; min-width: 0;"
              >
              <button type="button" aria-label="显示密码" style="background: transparent; border: 0; padding: 0; color: var(--apple-text-400); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <i data-lucide="eye-off" style="width: 18px; height: 18px;"></i>
              </button>
            </div>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            id="cta-login"
            data-dom-id="cta-login"
            class="w-full flex items-center justify-center"
            style="height: 48px; border-radius: 980px; border: none; background: var(--apple-primary); color: var(--apple-primary-foreground); font-size: 17px; font-weight: 600; letter-spacing: -0.02em; cursor: pointer; transition: filter 0.18s ease, transform 0.18s ease; margin-top: 4px; white-space: nowrap;"
          >
            登录
          </button>
        </form>

        <!-- Help Text -->
        <p style="font-size: 12px; color: var(--apple-text-400); margin: 0; text-align: center; line-height: 1.5;">
          登录即表示同意相关协议
        </p>

      </section>
    </div>
  </main>

  <script>lucide.createIcons();</script>

  <!-- Custom styles for frosted glass background and focus states -->
  <style>
    body {
      background: linear-gradient(180deg, var(--apple-background) 0%, var(--apple-muted) 100%);
    }
    .field:focus-within {
      border-color: var(--apple-ring) !important;
      box-shadow: 0 0 0 1px var(--apple-ring);
    }
    button[type="submit"]:hover {
      filter: brightness(0.96);
    }
    button[type="submit"]:active {
      transform: scale(0.99);
    }
    button[type="submit"]:focus-visible {
      outline: 2px solid var(--apple-ring);
      outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
    @media (max-width: 480px) {
      section {
        padding: 40px 24px !important;
        margin: 0 16px;
      }
    }
  </style>

</body>
</html>
