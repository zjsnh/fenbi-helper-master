<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#F8F7FF" />

  <!-- Open book shape - left page -->
  <path d="M256 160 L256 380 L100 340 L100 120 Z" fill="url(#grad1)" opacity="0.95">
    <animateTransform attributeName="transform" type="rotate" from="0 256 270" to="0 256 270" dur="1s" />
  </path>

  <!-- Open book shape - right page -->
  <path d="M256 160 L256 380 L412 340 L412 120 Z" fill="url(#grad2)" opacity="0.95">
    <animateTransform attributeName="transform" type="rotate" from="0 256 270" to="0 256 270" dur="1s" />
  </path>

  <!-- Page lines - left -->
  <line x1="160" y1="190" x2="230" y2="205" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.5" />
  <line x1="155" y1="220" x2="235" y2="238" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4" />
  <line x1="150" y1="250" x2="238" y2="270" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3" />
  <line x1="148" y1="280" x2="240" y2="302" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.2" />

  <!-- Page lines - right -->
  <line x1="282" y1="205" x2="352" y2="190" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.5" />
  <line x1="277" y1="238" x2="357" y2="220" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4" />
  <line x1="274" y1="270" x2="362" y2="250" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3" />
  <line x1="272" y1="302" x2="364" y2="280" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.2" />

  <!-- Spark/knowledge dot - top right -->
  <circle cx="370" cy="140" r="18" fill="#F59E0B" opacity="0.9" />
  <circle cx="370" cy="140" r="10" fill="#FDE68A" opacity="0.7" />

  <!-- Small accent dots -->
  <circle cx="390" cy="115" r="6" fill="#F59E0B" opacity="0.5" />
  <circle cx="398" cy="145" r="4" fill="#F59E0B" opacity="0.4" />
  <circle cx="380" cy="160" r="5" fill="#F59E0B" opacity="0.3" />

  <!-- Spine highlight -->
  <line x1="256" y1="160" x2="256" y2="380" stroke="white" stroke-width="3" opacity="0.6" />
</svg>